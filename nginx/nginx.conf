upstream backend {
    server backend:8000;
}

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name nostudiofluir.com.br www.nostudiofluir.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name nostudiofluir.com.br www.nostudiofluir.com.br;

    ssl_certificate     /etc/letsencrypt/live/nostudiofluir.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nostudiofluir.com.br/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    # Sistema de gestão React (Fase 2)
    location /sistema/ {
        alias /var/www/frontend/;
        try_files $uri $uri/ /sistema/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Assets do frontend com cache longo (hashed filenames)
    location /sistema/assets/ {
        alias /var/www/frontend/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API Backend
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin Django
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Arquivos estáticos Django (admin, DRF browsable API)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Arquivos de mídia
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Site institucional (Fase 3) — raiz do domínio
    location / {
        root /var/www/site-institucional;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
